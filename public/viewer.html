<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronômetro</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #060608;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .glow-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: background 1s ease;
    }

    .timer-display {
      position: relative;
      z-index: 10;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(100px, 22vw, 280px);
      letter-spacing: 0.04em;
      line-height: 1;
      user-select: none;
      transition: color 0.5s, text-shadow 0.5s, opacity 0.3s;
      color: #e8e8f0;
    }

    .timer-display.green {
      color: #00f5a0;
      text-shadow: 0 0 60px rgba(0, 245, 160, 0.7), 0 0 120px rgba(0, 245, 160, 0.3);
    }

    .timer-display.yellow {
      color: #ffb800;
      text-shadow: 0 0 60px rgba(255, 184, 0, 0.7), 0 0 120px rgba(255, 184, 0, 0.3);
    }

    .timer-display.red {
      color: #ff3e3e;
      text-shadow: 0 0 60px rgba(255, 62, 62, 0.8), 0 0 120px rgba(255, 62, 62, 0.4);
    }

    .timer-display.blink {
      color: #ff3e3e;
      text-shadow: 0 0 60px rgba(255, 62, 62, 0.8), 0 0 120px rgba(255, 62, 62, 0.4);
      animation: timerBlink 0.5s infinite;
    }

    .timer-display.paused {
      opacity: 0.4;
    }

    @keyframes timerBlink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.08;
      }
    }
  </style>
</head>

<body>
  <div class="glow-bg" id="glow-bg"></div>
  <div class="timer-display" id="timer-display">--:--:--</div>

  <script>
    const socket = io();
    const sessionId = window.location.pathname.split('/').pop();

    socket.emit('session:join', sessionId, 'viewer');

    socket.on('timer:tick', ({ status, remaining, totalTime, pct }) => {
      const display = document.getElementById('timer-display');
      const glowBg = document.getElementById('glow-bg');

      display.textContent = formatTime(remaining);

      let phase = 'green';
      if (pct <= 0.10) phase = 'blink';
      else if (pct <= 0.20) phase = 'red';
      else if (pct <= 0.40) phase = 'yellow';

      let cls = 'timer-display';
      if (status === 'running') cls += ' ' + phase;
      else if (status === 'paused') cls += ' ' + phase + ' paused';
      else cls += ' green';
      display.className = cls;

      const glows = {
        green: 'radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0,245,160,0.05) 0%, transparent 70%)',
        yellow: 'radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,184,0,0.07) 0%, transparent 70%)',
        red: 'radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,62,62,0.08) 0%, transparent 70%)',
        blink: 'radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255,62,62,0.12) 0%, transparent 70%)',
      };
      glowBg.style.background = status === 'running' ? (glows[phase] || glows.green) : 'none';
    });

    function formatTime(ms) {
      if (ms < 0) ms = 0;
      const totalSec = Math.ceil(ms / 1000);
      const secs = totalSec % 60;
      const mins = Math.floor(totalSec / 60) % 60;
      const hrs = Math.floor(totalSec / 3600);
      return `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
  </script>
</body>

</html>

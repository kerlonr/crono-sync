<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronômetro — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600;900&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --panel: #13131c;
      --border: #1e1e30;
      --accent: #00f5a0;
      --accent2: #00c9ff;
      --danger: #ff3e3e;
      --warn: #ffb800;
      --text: #e8e8f0;
      --muted: #55556a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,245,160,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(0,201,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 360px;
    }
    .login-box h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.15em;
    }
    .login-box input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:active { transform: scale(0.98); }
    #login-error { font-size: 13px; color: var(--danger); letter-spacing: 0.05em; height: 16px; }

    /* ADMIN PANEL */
    #admin-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 40px 20px;
      animation: fadeIn 0.4s ease;
      width: 100%;
      max-width: 680px;
    }
    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,245,160,0.3);
      border-radius: 20px;
      padding: 5px 16px;
    }

    /* TIME SETTER */
    .time-setter {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .time-setter-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .time-inputs {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .time-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .time-input-group label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .time-input-group input {
      width: 72px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px;
      color: var(--text);
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    .time-input-group input:focus { border-color: var(--accent); }
    .time-sep {
      font-family: 'Share Tech Mono', monospace;
      font-size: 24px;
      color: var(--muted);
      margin-top: 14px;
    }
    .time-setter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-set {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-set:hover { opacity: 0.85; }
    .presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .preset {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .preset:hover { border-color: var(--accent); color: var(--accent); }
    .preset.saved-indicator {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* TIMER DISPLAY */
    .timer-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(64px, 12vw, 110px);
      letter-spacing: 0.05em;
      color: var(--text);
      transition: color 0.3s, text-shadow 0.3s;
      user-select: none;
    }
    .timer-display.green {
      color: var(--accent);
      text-shadow: 0 0 40px rgba(0,245,160,0.5);
    }
    .timer-display.yellow {
      color: var(--warn);
      text-shadow: 0 0 40px rgba(255,184,0,0.5);
    }
    .timer-display.red {
      color: var(--danger);
      text-shadow: 0 0 40px rgba(255,62,62,0.5);
    }
    .timer-display.blink {
      animation: timerBlink 0.5s infinite;
    }
    @keyframes timerBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    /* PROGRESS BAR */
    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.1s linear, background 0.5s;
      background: var(--accent);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.running { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
    .status-dot.paused { background: var(--warn); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .controls { display: flex; gap: 16px; }
    .btn {
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      border-radius: 10px;
      padding: 16px 36px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-start { background: var(--accent); color: #000; }
    .btn-pause { background: var(--warn); color: #000; }
    .btn-reset { background: transparent; color: var(--danger); border: 1px solid rgba(255,62,62,0.3); }
    .btn-reset:hover { border-color: var(--danger); background: rgba(255,62,62,0.05); }

    .viewer-link { font-size: 13px; color: var(--muted); }
    .viewer-link a { color: var(--accent2); text-decoration: none; font-family: 'Share Tech Mono', monospace; }
    .viewer-link a:hover { text-decoration: underline; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h2>⬡ Painel Admin</h2>
      <input type="password" id="password-input" placeholder="senha" autocomplete="off" />
      <div id="login-error"></div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin-panel">
    <span class="badge">● Admin Control</span>

    <!-- TIME SETTER -->
    <div class="time-setter">
      <div class="time-setter-label">⏱ Definir tempo do pitch</div>
      <div class="time-inputs">
        <div class="time-input-group">
          <label>horas</label>
          <input type="number" id="input-h" min="0" max="23" value="0" />
        </div>
        <div class="time-sep">:</div>
        <div class="time-input-group">
          <label>minutos</label>
          <input type="number" id="input-m" min="0" max="59" value="5" />
        </div>
        <div class="time-sep">:</div>
        <div class="time-input-group">
          <label>segundos</label>
          <input type="number" id="input-s" min="0" max="59" value="0" />
        </div>
      </div>
      <div class="time-setter-actions">
        <button class="btn-set" onclick="setTime()">✓ Definir</button>
        <button class="btn-set" style="background:var(--accent2)" onclick="saveTime()">💾 Salvar</button>
        <div class="presets" id="presets-row">
          <button class="preset" onclick="applyPreset(60)">1 min</button>
          <button class="preset" onclick="applyPreset(180)">3 min</button>
          <button class="preset" onclick="applyPreset(300)">5 min</button>
          <button class="preset" onclick="applyPreset(600)">10 min</button>
        </div>
      </div>
    </div>

    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="progress-bar-wrap" style="width:100%;max-width:500px">
      <div class="progress-bar-fill" id="progress-bar" style="width:100%"></div>
    </div>

    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">PARADO</span>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btn-start" onclick="timerStart()">▶ Start</button>
      <button class="btn btn-pause" id="btn-pause" onclick="timerPause()" disabled>⏸ Pause</button>
      <button class="btn btn-reset" onclick="timerReset()">↺ Reset</button>
    </div>

    <div class="viewer-link">
      Tela de visualização: <a href="/viewer.html" target="_blank">/viewer.html</a>
    </div>
  </div>

<script>
  const socket = io();

  // Carrega tempo salvo do localStorage
  function loadSaved() {
    const saved = localStorage.getItem('pitch_timer_saved');
    if (saved) {
      const secs = parseInt(saved);
      document.getElementById('input-h').value = Math.floor(secs / 3600);
      document.getElementById('input-m').value = Math.floor((secs % 3600) / 60);
      document.getElementById('input-s').value = secs % 60;
      markSavedPreset(secs);
    }
  }

  function markSavedPreset(totalSecs) {
    document.querySelectorAll('.preset').forEach(b => b.classList.remove('saved-indicator'));
    const presets = [60, 180, 300, 600];
    const idx = presets.indexOf(totalSecs);
    if (idx >= 0) {
      document.querySelectorAll('.preset')[idx].classList.add('saved-indicator');
    }
  }

  function getInputMs() {
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    const s = parseInt(document.getElementById('input-s').value) || 0;
    return (h * 3600 + m * 60 + s) * 1000;
  }

  function setTime() {
    const ms = getInputMs();
    if (ms <= 0) return;
    socket.emit('timer:setTime', ms);
  }

  function saveTime() {
    const ms = getInputMs();
    if (ms <= 0) return;
    const totalSecs = ms / 1000;
    localStorage.setItem('pitch_timer_saved', totalSecs);
    markSavedPreset(totalSecs);
    socket.emit('timer:setTime', ms);
    // Feedback visual
    const btn = event.target;
    btn.textContent = '✓ Salvo!';
    setTimeout(() => btn.textContent = '💾 Salvar', 1500);
  }

  function applyPreset(secs) {
    document.getElementById('input-h').value = Math.floor(secs / 3600);
    document.getElementById('input-m').value = Math.floor((secs % 3600) / 60);
    document.getElementById('input-s').value = secs % 60;
    socket.emit('timer:setTime', secs * 1000);
  }

  socket.on('timer:tick', ({ status, remaining, totalTime, pct }) => {
    updateDisplay(remaining, pct, status);
    updateUI(status);
  });

  function doLogin() {
    const pw = document.getElementById('password-input').value;
    socket.emit('admin:login', pw, (res) => {
      if (res.success) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'flex';
        loadSaved();
      } else {
        document.getElementById('login-error').textContent = 'Senha incorreta.';
      }
    });
  }

  document.getElementById('password-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  function timerStart() { socket.emit('timer:start'); }
  function timerPause() { socket.emit('timer:pause'); }
  function timerReset() { socket.emit('timer:reset'); }

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const totalSec = Math.ceil(ms / 1000);
    const secs = totalSec % 60;
    const mins = Math.floor(totalSec / 60) % 60;
    const hrs = Math.floor(totalSec / 3600);
    return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  }

  function getPhase(pct) {
    if (pct <= 0.10) return 'blink';
    if (pct <= 0.20) return 'red';
    if (pct <= 0.40) return 'yellow';
    return 'green';
  }

  function updateDisplay(remaining, pct, status) {
    const display = document.getElementById('timer-display');
    const bar = document.getElementById('progress-bar');

    display.textContent = formatTime(remaining);

    // Cor da barra
    let barColor = '#00f5a0';
    if (pct <= 0.10) barColor = '#ff3e3e';
    else if (pct <= 0.20) barColor = '#ff3e3e';
    else if (pct <= 0.40) barColor = '#ffb800';
    bar.style.width = (pct * 100) + '%';
    bar.style.background = barColor;

    // Cor e animação do display
    const phase = getPhase(pct);
    if (status === 'running' || status === 'paused') {
      display.className = 'timer-display ' + phase;
    } else {
      display.className = 'timer-display green';
    }
  }

  function updateUI(status) {
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');

    dot.className = 'status-dot ' + status;

    if (status === 'running') {
      statusText.textContent = 'RODANDO';
      btnStart.disabled = true;
      btnPause.disabled = false;
    } else if (status === 'paused') {
      statusText.textContent = 'PAUSADO';
      btnStart.disabled = false;
      btnStart.textContent = '▶ Continuar';
      btnPause.disabled = true;
    } else {
      statusText.textContent = 'PARADO';
      btnStart.disabled = false;
      btnStart.textContent = '▶ Start';
      btnPause.disabled = true;
    }
  }
</script>
</body>
</html>

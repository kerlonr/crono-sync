<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronômetro — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600;900&display=swap" rel="stylesheet"/>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --panel: #13131c;
      --border: #1e1e30;
      --accent: #00f5a0;
      --accent2: #00c9ff;
      --danger: #ff3e3e;
      --warn: #ffb800;
      --text: #e8e8f0;
      --muted: #55556a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,245,160,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 80% 20%, rgba(0,201,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 360px;
    }
    .login-box h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
    .login-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px;
      font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--text);
      outline: none; transition: border-color 0.2s; text-align: center; letter-spacing: 0.15em;
    }
    .login-box input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 14px; font-family: 'Barlow', sans-serif;
      font-size: 14px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:active { transform: scale(0.98); }
    #login-error { font-size: 13px; color: var(--danger); letter-spacing: 0.05em; height: 16px; }

    /* ADMIN PANEL */
    #admin-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 640px;
      animation: fadeIn 0.4s ease;
    }
    .badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--accent); border: 1px solid rgba(0,245,160,0.3); border-radius: 20px; padding: 5px 16px;
    }

    /* TIME SETTER */
    .time-setter {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 24px; width: 100%;
      display: flex; flex-direction: column; gap: 16px;
    }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); }
    .time-inputs { display: flex; align-items: center; gap: 8px; }
    .time-input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .time-input-group label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .time-input-group input {
      width: 68px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 8px;
      font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--text);
      outline: none; text-align: center; transition: border-color 0.2s;
    }
    .time-input-group input:focus { border-color: var(--accent); }
    .time-sep { font-family: 'Share Tech Mono', monospace; font-size: 24px; color: var(--muted); margin-top: 14px; }

    .setter-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn-set {
      background: var(--accent); color: #000; border: none; border-radius: 8px;
      padding: 10px 22px; font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 900;
      letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-set:hover { opacity: 0.85; }
    .btn-set.secondary { background: var(--accent2); }

    /* PRESETS */
    .presets-section {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 24px; width: 100%;
      display: flex; flex-direction: column; gap: 14px;
    }
    .presets-header { display: flex; align-items: center; justify-content: space-between; }
    .presets-list { display: flex; gap: 8px; flex-wrap: wrap; min-height: 36px; }
    .preset-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 12px;
      font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .preset-chip:hover { border-color: var(--accent); color: var(--accent); }
    .preset-chip .del {
      color: var(--muted); font-size: 14px; line-height: 1;
      transition: color 0.2s; cursor: pointer; padding: 0 2px;
    }
    .preset-chip .del:hover { color: var(--danger); }
    .presets-empty { font-size: 12px; color: var(--muted); font-style: italic; }

    /* ADD PRESET */
    .add-preset-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .add-preset-row input {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-family: 'Barlow', sans-serif; font-size: 13px; color: var(--text);
      outline: none; width: 140px; transition: border-color 0.2s;
    }
    .add-preset-row input:focus { border-color: var(--accent2); }
    .btn-add-preset {
      background: transparent; border: 1px solid var(--accent2); border-radius: 8px;
      padding: 8px 16px; font-family: 'Barlow', sans-serif; font-size: 12px; font-weight: 700;
      color: var(--accent2); cursor: pointer; letter-spacing: 0.1em; transition: background 0.2s;
    }
    .btn-add-preset:hover { background: rgba(0,201,255,0.08); }

    /* TIMER */
    .timer-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(60px, 11vw, 100px);
      letter-spacing: 0.05em; color: var(--text);
      transition: color 0.3s, text-shadow 0.3s; user-select: none;
    }
    .timer-display.green { color: var(--accent); text-shadow: 0 0 40px rgba(0,245,160,0.5); }
    .timer-display.yellow { color: var(--warn); text-shadow: 0 0 40px rgba(255,184,0,0.5); }
    .timer-display.red { color: var(--danger); text-shadow: 0 0 40px rgba(255,62,62,0.5); }
    .timer-display.blink { color: var(--danger); text-shadow: 0 0 40px rgba(255,62,62,0.5); animation: timerBlink 0.5s infinite; }
    @keyframes timerBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }

    .progress-bar-wrap { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.1s linear, background 0.5s; background: var(--accent); }

    .status-row { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
    .status-dot.running { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.5s infinite; }
    .status-dot.paused { background: var(--warn); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .controls { display: flex; gap: 16px; }
    .btn {
      font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 900;
      letter-spacing: 0.2em; text-transform: uppercase; border: none;
      border-radius: 10px; padding: 16px 36px; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-start { background: var(--accent); color: #000; }
    .btn-pause { background: var(--warn); color: #000; }
    .btn-reset { background: transparent; color: var(--danger); border: 1px solid rgba(255,62,62,0.3); }
    .btn-reset:hover { border-color: var(--danger); background: rgba(255,62,62,0.05); }

    .viewer-link { font-size: 13px; color: var(--muted); }
    .viewer-link a { color: var(--accent2); text-decoration: none; font-family: 'Share Tech Mono', monospace; }
    .viewer-link a:hover { text-decoration: underline; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <h2>⬡ Painel Admin</h2>
      <input type="password" id="password-input" placeholder="senha" autocomplete="off" />
      <div id="login-error"></div>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <!-- ADMIN -->
  <div id="admin-panel">
    <span class="badge">● Admin Control</span>

    <!-- TIME SETTER -->
    <div class="time-setter">
      <div class="section-label">⏱ Definir tempo do pitch</div>
      <div class="time-inputs">
        <div class="time-input-group">
          <label>horas</label>
          <input type="number" id="input-h" min="0" max="23" value="0" />
        </div>
        <div class="time-sep">:</div>
        <div class="time-input-group">
          <label>min</label>
          <input type="number" id="input-m" min="0" max="59" value="5" />
        </div>
        <div class="time-sep">:</div>
        <div class="time-input-group">
          <label>seg</label>
          <input type="number" id="input-s" min="0" max="59" value="0" />
        </div>
      </div>
      <div class="setter-actions">
        <button class="btn-set" onclick="setTime()">✓ Definir</button>
        <button class="btn-set secondary" onclick="saveLastTime()">💾 Salvar como último</button>
      </div>
    </div>

    <!-- PRESETS -->
    <div class="presets-section">
      <div class="presets-header">
        <div class="section-label">📌 Presets salvos</div>
      </div>
      <div class="presets-list" id="presets-list">
        <span class="presets-empty">Nenhum preset salvo ainda.</span>
      </div>
      <div class="add-preset-row">
        <input type="text" id="preset-name" placeholder="Nome do preset (ex: Pitch 3min)" maxlength="30" />
        <button class="btn-add-preset" onclick="addPreset()">+ Salvar preset atual</button>
      </div>
    </div>

    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:100%"></div>
    </div>

    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">PARADO</span>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btn-start" onclick="timerStart()">▶ Start</button>
      <button class="btn btn-pause" id="btn-pause" onclick="timerPause()" disabled>⏸ Pause</button>
      <button class="btn btn-reset" onclick="timerReset()">↺ Reset</button>
    </div>

    <div class="viewer-link">
      Tela de visualização: <a href="/viewer.html" target="_blank">/viewer.html</a>
    </div>
  </div>

<script>
  const socket = io();
  const PRESETS_KEY = 'pitch_timer_presets';
  const LAST_KEY = 'pitch_timer_last';

  // ── Presets ──────────────────────────────────────────────
  function loadPresets() {
    try { return JSON.parse(localStorage.getItem(PRESETS_KEY)) || []; }
    catch { return []; }
  }

  function savePresets(presets) {
    localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
  }

  function renderPresets() {
    const list = document.getElementById('presets-list');
    const presets = loadPresets();
    if (presets.length === 0) {
      list.innerHTML = '<span class="presets-empty">Nenhum preset salvo ainda.</span>';
      return;
    }
    list.innerHTML = '';
    presets.forEach((p, i) => {
      const chip = document.createElement('div');
      chip.className = 'preset-chip';
      chip.innerHTML = `<span onclick="applyPreset(${p.secs})">${p.name}</span><span class="del" onclick="deletePreset(${i})" title="Remover">✕</span>`;
      list.appendChild(chip);
    });
  }

  function addPreset() {
    const name = document.getElementById('preset-name').value.trim();
    if (!name) { document.getElementById('preset-name').focus(); return; }
    const ms = getInputMs();
    if (ms <= 0) return;
    const secs = ms / 1000;
    const presets = loadPresets();
    presets.push({ name, secs });
    savePresets(presets);
    renderPresets();
    document.getElementById('preset-name').value = '';
  }

  function deletePreset(i) {
    const presets = loadPresets();
    presets.splice(i, 1);
    savePresets(presets);
    renderPresets();
  }

  function applyPreset(secs) {
    document.getElementById('input-h').value = Math.floor(secs / 3600);
    document.getElementById('input-m').value = Math.floor((secs % 3600) / 60);
    document.getElementById('input-s').value = secs % 60;
    socket.emit('timer:setTime', secs * 1000);
  }

  // ── Último tempo salvo ────────────────────────────────────
  function loadLast() {
    const saved = localStorage.getItem(LAST_KEY);
    if (saved) {
      const secs = parseInt(saved);
      document.getElementById('input-h').value = Math.floor(secs / 3600);
      document.getElementById('input-m').value = Math.floor((secs % 3600) / 60);
      document.getElementById('input-s').value = secs % 60;
    }
  }

  function saveLastTime() {
    const ms = getInputMs();
    if (ms <= 0) return;
    localStorage.setItem(LAST_KEY, ms / 1000);
    socket.emit('timer:setTime', ms);
    const btn = event.target;
    btn.textContent = '✓ Salvo!';
    setTimeout(() => btn.textContent = '💾 Salvar como último', 1500);
  }

  // ── Utils ─────────────────────────────────────────────────
  function getInputMs() {
    const h = parseInt(document.getElementById('input-h').value) || 0;
    const m = parseInt(document.getElementById('input-m').value) || 0;
    const s = parseInt(document.getElementById('input-s').value) || 0;
    return (h * 3600 + m * 60 + s) * 1000;
  }

  function setTime() {
    const ms = getInputMs();
    if (ms <= 0) return;
    socket.emit('timer:setTime', ms);
  }

  // ── Socket ────────────────────────────────────────────────
  socket.on('timer:tick', ({ status, remaining, totalTime, pct }) => {
    updateDisplay(remaining, pct, status);
    updateUI(status);
  });

  function doLogin() {
    const pw = document.getElementById('password-input').value;
    socket.emit('admin:login', pw, (res) => {
      if (res.success) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'flex';
        loadLast();
        renderPresets();
      } else {
        document.getElementById('login-error').textContent = 'Senha incorreta.';
      }
    });
  }

  document.getElementById('password-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('preset-name').addEventListener('keydown', e => { if (e.key === 'Enter') addPreset(); });

  function timerStart() { socket.emit('timer:start'); }
  function timerPause() { socket.emit('timer:pause'); }
  function timerReset() { socket.emit('timer:reset'); }

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const totalSec = Math.ceil(ms / 1000);
    const secs = totalSec % 60;
    const mins = Math.floor(totalSec / 60) % 60;
    const hrs = Math.floor(totalSec / 3600);
    return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  }

  function getPhase(pct) {
    if (pct <= 0.10) return 'blink';
    if (pct <= 0.20) return 'red';
    if (pct <= 0.40) return 'yellow';
    return 'green';
  }

  function updateDisplay(remaining, pct, status) {
    const display = document.getElementById('timer-display');
    const bar = document.getElementById('progress-bar');
    display.textContent = formatTime(remaining);
    const barColor = pct <= 0.20 ? '#ff3e3e' : pct <= 0.40 ? '#ffb800' : '#00f5a0';
    bar.style.width = (pct * 100) + '%';
    bar.style.background = barColor;
    const phase = getPhase(pct);
    display.className = 'timer-display ' + ((status === 'running' || status === 'paused') ? phase : 'green');
  }

  function updateUI(status) {
    const dot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    dot.className = 'status-dot ' + status;
    if (status === 'running') {
      statusText.textContent = 'RODANDO'; btnStart.disabled = true; btnPause.disabled = false;
    } else if (status === 'paused') {
      statusText.textContent = 'PAUSADO'; btnStart.disabled = false; btnStart.textContent = '▶ Continuar'; btnPause.disabled = true;
    } else {
      statusText.textContent = 'PARADO'; btnStart.disabled = false; btnStart.textContent = '▶ Start'; btnPause.disabled = true;
    }
  }
</script>
</body>
</html>

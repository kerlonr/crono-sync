<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cronômetro</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0b0b10;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #22c55e;
            --text: #f5f5f7;
            --muted: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #101018, #0b0b10);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 56px 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;

            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text);
            margin-bottom: 16px;
        }

        h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
        }

        p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;

            background: var(--accent);
            color: #052e16;

            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.25);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">00:00</div>

        <h1>Cronômetro</h1>

        <p>
            Crie um cronômetro e compartilhe o link para acompanhar em tempo real.
        </p>

        <button class="btn" id="btn-criar" onclick="criar()">
            Criar cronômetro
        </button>
    </div>

    <script>
        async function criar() {
            const btn = document.getElementById('btn-criar');
            btn.disabled = true;
            btn.textContent = 'Criando...';

            const res = await fetch('/api/session/new', { method: 'POST' });
            const { id } = await res.json();

            window.location.href = `/admin/${id}`;
        }
    </script>

</body>

</html>
